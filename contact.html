<style>
body { font-family: 'General Sans', sans-serif; cursor: none; }
* { cursor: none !important; }

/* Cursor */
.cursor-ring {
  position: fixed;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.7);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
}

/* Card base */
.card {
  position: relative;
  transition: transform 0.25s ease, box-shadow 0.3s ease;
  transform-style: preserve-3d;
  will-change: transform;
  overflow: hidden;
}

.card:hover {
  box-shadow: 0 40px 100px rgba(255,255,255,0.12);
}

/* Base white edge (same as main page) */
.lux-border {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1px;
  z-index: 1;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.35),
    rgba(255,255,255,0.1),
    rgba(255,255,255,0.25)
  );

  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

/* Hover animated border */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 0.5px;
  z-index: 1;
  pointer-events: none;

  background: linear-gradient(120deg, #a855f7, #ffffff, #a855f7);
  background-size: 200% 200%;
  opacity: 0;

  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.card:hover::before {
  opacity: 1;
  animation: borderFlow 2.5s linear infinite;
}

@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Glow layers */
.top-glow,
.cursor-glow {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  z-index: 1;
}

.top-glow {
  top: 0;
  height: 30%;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
  filter: blur(25px);
  border-radius: 9999px;
}

.cursor-glow {
  opacity: 0;
  transition: opacity 0.2s ease;
}

.card:hover .cursor-glow {
  opacity: 1;
}

/* Ensure content is above everything */
.card > *:not(.lux-border):not(.top-glow):not(.cursor-glow) {
  position: relative;
  z-index: 2;
}

/* Icons */
.icon-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.2s ease;
}

.icon-btn:hover {
  transform: scale(0.9);
  background: rgba(255,255,255,0.12);
}

.icon-btn img {
  width: 20px;
  height: 20px;
}
</style>
</head>

<body class="bg-black text-white">

<!-- Ayush -->
<div class="card rounded-2xl p-8 bg-white/5 backdrop-blur-xl">

<script>
// Tilt + glow
document.querySelectorAll('.card').forEach(card => {
  const glow = card.querySelector('.cursor-glow');

  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const px = x / rect.width;
    const py = y / rect.height;

    const rotateX = (py - 0.5) * 8;
    const rotateY = (px - 0.5) * 8;

    const dist = Math.sqrt((px - 0.5)**2 + (py - 0.5)**2);
    const scale = 1 - dist * 0.05;

    card.style.transform =
      `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;

    glow.style.background =
      `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.18), transparent 40%)`;
  });

  card.addEventListener('mouseleave', () => {
    card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
    glow.style.background = 'none';
  });
});

// Header blur
const header = document.getElementById('mainHeader');
window.addEventListener('scroll', () => {
  if (window.scrollY > 10) {
    header.classList.add('backdrop-blur-md','bg-black/40');
  } else {
    header.classList.remove('backdrop-blur-md','bg-black/40');
  }
});

// Cursor
const ring = document.getElementById('cursorRing');
window.addEventListener('mousemove', e => {
  ring.style.left = e.clientX + 'px';
  ring.style.top = e.clientY + 'px';
});
</script>
